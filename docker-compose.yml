services:
  trainlog:
    image: nginx:alpine
    container_name: trainlog
    restart: unless-stopped
    ports:
      - "3080:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  api:
    build: ./server
    container_name: trainlog-api
    restart: unless-stopped
    volumes:
      - trainlog-data:/app/data
    expose:
      - "3001"
    env_file:
      - ./server/.env

volumes:
  trainlog-data:
